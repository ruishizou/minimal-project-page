project:
  title: "Atlas: A Minimal Academic Folio"
  subtitle: "A configurable research page for publishing papers, demos, and reproducible artifacts."
  venue: "Conference on Human-Centered AI Systems 2026"
  award: "Best Paper Honorable Mention"
  abstract: "Atlas demonstrates how a small metadata file and markdown sections can generate a polished single-page academic folio. The mock study focuses on helping research teams publish a paper, demo, benchmark, and citation without maintaining a bespoke website."
  teaser:
    image: "/sections/teaser.svg"
    alt: "Layered academic project materials arranged as a neutral system diagram"

